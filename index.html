<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎂</title>
<style>
body {
    text-align: center;
    font-family: Arial;
    background: linear-gradient(to right, pink, lightblue);
}
h1 { color: red; margin-top: 50px; }
p { font-size: 18px; }
button {
    padding: 10px 20px;
    font-size: 18px;
    background-color: orange;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 20px;
}
.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    width: 60%;
    margin: auto;
    box-shadow: 0 0 10px gray;
}
</style>
</head>

<body>

<h1>🎉 สุขสันต์วันเกิด 🎉</h1>

<div class="card">
    <p>Happy Birthday 🎂 ขอให้วันนี้เป็นวันที่ดีที่สุดของชาช่าน้าา 💕</p>
    
    <h2 id="msg">👇 กดปุ่มนี้ก่อน!</h2>

    <button onclick="showMsg()">กดเลย 🎁</button>
</div>

<script>
function showMsg() {
    document.getElementById("msg").innerHTML =
    "วันนี้เป็นวันพิเศษของซายัง 💖";
}
</script>

</body>
</html>
